<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Identity - Security System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f2f5;
        }

        .card {
            background: #ffffff;
            width: 400px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
        }

        .icon-box {
            width: 60px;
            height: 60px;
            background: #ecfdf5;
            color: #10b981;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            font-size: 30px;
        }

        h2 {
            margin-bottom: 10px;
            color: #1a1a1a;
            font-weight: 600;
        }

        p {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .status-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .form-group {
            margin-bottom: 20px;
        }

        /* עיצוב שדה הקוד */
        .code-input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #d1d5db;
            font-size: 24px;
            text-align: center;
            letter-spacing: 8px;
            font-weight: bold;
            outline: none;
            transition: all 0.3s ease;
        }

        .code-input:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .verify-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #10b981;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .verify-btn:hover {
            background: #059669;
        }

        .resend-text {
            margin-top: 25px;
            font-size: 13px;
            color: #9ca3af;
        }

        .resend-text a {
            color: #10b981;
            text-decoration: none;
            font-weight: 600;
        }

        .resend-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon-box">✉️</div>
    <h2>Check your email</h2>
    <p>We've sent a 6-digit verification code to your registered email address. Please enter it below to continue.</p>

    {% if error %}
    <div class="status-message">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <input type="text"
                   name="two_fa_code"
                   class="code-input"
                   placeholder="000000"
                   maxlength="6"
                   pattern="\d{6}"
                   required
                   autofocus
                   autocomplete="one-time-code">
        </div>

        <button type="submit" class="verify-btn">
            Verify & Login
        </button>
    </form>

    <div class="resend-text">
        Didn't receive the code? <a href="#">Resend Code</a>
    </div>
</div>

<script>
    // הגבלה להזנת מספרים בלבד בשדה הקוד
    const input = document.querySelector('.code-input');
    input.addEventListener('input', function (e) {
        this.value = this.value.replace(/[^0-9]/g, '');
    });
</script>

</body>
</html>
